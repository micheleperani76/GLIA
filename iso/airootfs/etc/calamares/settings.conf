# ============================================================
# Calamares settings - GLIA installer
# Version: 1.0 - 2026-07-12
# Project: GLIA (GNU Linux IA)
# ============================================================
---
modules-search: [ local ]

instances:
- id: aimodel
  module: packagechooser
  config: packagechooser_aimodel.conf
- id: aimodel
  module: contextualprocess
  config: contextualprocess_aimodel.conf
- id: postclean
  module: shellprocess
  config: shellprocess_postclean.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - packagechooser@aimodel
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - networkcfg
  - hwclock
  - services-systemd
  - contextualprocess@aimodel
  - shellprocess@postclean
  - initcpiocfg
  - initcpio
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: glia
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false

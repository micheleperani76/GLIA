# ============================================================
# Calamares settings - GLIA installer
# Version: 1.3 - 2026-07-12 (v1.2: instances @glia anti-conflitto, modulo gliaai;
#   v1.3: bootloader@glia = systemd-boot al posto del default limine, via grubcfg)
# Project: GLIA (GNU Linux IA)
# ============================================================
---
modules-search: [ local, /etc/calamares/modules-custom ]

instances:
- id: aimodel
  module: packagechooser
  config: packagechooser_aimodel.conf
- id: postclean
  module: shellprocess
  config: shellprocess_postclean.conf
- id: glia
  module: users
  config: users_glia.conf
- id: glia
  module: unpackfs
  config: unpackfs_glia.conf
- id: glia
  module: services-systemd
  config: services-systemd_glia.conf
- id: glia
  module: bootloader
  config: bootloader_glia.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users@glia
  - packagechooser@aimodel
  - summary
- exec:
  - partition
  - mount
  - unpackfs@glia
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users@glia
  - networkcfg
  - hwclock
  - services-systemd@glia
  - gliaai
  - shellprocess@postclean
  - initcpiocfg
  - initcpio
  - grubcfg
  - bootloader@glia
  - umount
- show:
  - finished

branding: glia
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false

# GLIA - clean live-only bits from the installed system
---
dontChroot: false
timeout: 120
script:
# live autologin: gone
- "rm -f /etc/systemd/system/getty@tty1.service.d/autologin.conf"
# ollama runs as its own user on the installed system (root was live-only)
- "rm -f /etc/systemd/system/ollama.service.d/glia-live.conf"
- "sh -c 'chown -R ollama:ollama /var/lib/ollama 2>/dev/null || true'"
# archiso initramfs config: gone (initcpiocfg writes a clean one)
- "rm -f /etc/mkinitcpio.conf.d/archiso.conf"
# restore the standard linux.preset (the live one is archiso-only)
- "sh -c 'cp /etc/glia/linux.preset.installed /etc/mkinitcpio.d/linux.preset'"
# the live airootfs has no kernel in /boot: copy it from the modules tree
- "sh -c 'install -Dm644 /usr/lib/modules/*/vmlinuz /boot/vmlinuz-linux'"
# installed-system motd
- "sh -c 'cp /etc/glia/motd.installed /etc/motd 2>/dev/null || true'"
# the installer launcher makes no sense on the installed system
- "rm -f /usr/local/bin/glia-install"

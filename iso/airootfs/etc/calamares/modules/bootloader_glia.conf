# GLIA - bootloader: systemd-boot (UEFI) / GRUB (BIOS legacy)
# Version: 1.1 - 2026-07-12
# Il default di cachyos-calamares punta a limine (non presente
# nella ISO): su UEFI usiamo systemd-boot, incluso in systemd
# (bootctl install crea anche il fallback EFI/BOOT/BOOTX64.EFI).
# Su BIOS legacy il modulo usa GRUB con le chiavi qui sotto.
---
efiBootLoader: "systemd-boot"
kernelSearchPath: "/usr/lib/modules"
kernelPattern: "^vmlinuz.*"
loaderEntries:
  - "timeout 3"
  - "console-mode keep"
kernelParams: [ ]
efiBootloaderId: "glia"

# BIOS legacy (MBR)
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"

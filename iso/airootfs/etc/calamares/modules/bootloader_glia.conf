# GLIA - bootloader: systemd-boot
# Version: 1.0 - 2026-07-12
# Il default di cachyos-calamares punta a limine (non presente
# nella ISO): usiamo systemd-boot, incluso in systemd.
# bootctl install crea anche il fallback EFI/BOOT/BOOTX64.EFI.
---
efiBootLoader: "systemd-boot"
kernelSearchPath: "/usr/lib/modules"
kernelPattern: "^vmlinuz.*"
loaderEntries:
  - "timeout 3"
  - "console-mode keep"
kernelParams: [ ]
efiBootloaderId: "glia"
